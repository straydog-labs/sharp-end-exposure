<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Feedback — Sharp End Exposure</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#2a2420;--surface:#3a3228;--surface2:#463e34;--surface3:#524840;
  --border:#5a5248;--text:#f0ece6;--muted:#a09890;--muted2:#7a7068;
  --accent:#e8763a;--comfort:#7ec87a;--learning:#f5a623;--panic:#e84444;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;}
.wrap{max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* Header */
.hdr{padding-bottom:1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.75rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.wordmark{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.wordmark span{color:var(--accent);}
.title{font-size:28px;font-weight:700;letter-spacing:-.02em;line-height:1.1;color:var(--text);margin:6px 0 4px;}
.sub{font-size:13px;color:var(--muted);line-height:1.5;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Space Grotesk',sans-serif;}
.btn:hover{background:var(--surface2);}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-p:hover{opacity:.9;}

/* Metrics */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.75rem}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.metric-num{font-size:34px;font-weight:700;font-family:'Space Mono',monospace;line-height:1;margin-bottom:4px;}
.metric-lbl{font-size:11px;color:var(--muted);letter-spacing:.04em;line-height:1.4;}

/* Signal cards */
.signal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.75rem}
.sig-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.sig-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;}
.sig-num{font-size:38px;font-weight:700;font-family:'Space Mono',monospace;line-height:1;margin-bottom:2px;}
.sig-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.4;}
.verdict{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;margin-bottom:12px;letter-spacing:.04em;}
.v-red{background:rgba(232,68,68,.15);color:#e84444;}
.v-amber{background:rgba(245,166,35,.15);color:#f5a623;}
.v-green{background:rgba(126,200,122,.15);color:#7ec87a;}
.v-gray{background:rgba(255,255,255,.07);color:var(--muted);}
.dot-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.dot{width:13px;height:13px;border-radius:50%;}
.dot-lbl{font-size:10px;color:var(--muted);}

/* Detail cards */
.section-head{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:1.75rem 0 .875rem;}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:10px;}
.q-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;}
.q-sub{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-lbl{font-size:13px;color:var(--text);flex:1;min-width:0;line-height:1.4;}
.bar-track{width:120px;height:6px;background:rgba(255,255,255,.08);border-radius:99px;flex-shrink:0;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;}
.bar-n{font-size:12px;font-weight:600;color:var(--muted);min-width:14px;text-align:right;}
.bar-pct{font-size:11px;color:var(--muted2);min-width:28px;text-align:right;}
.insight{background:rgba(232,118,58,.06);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.65;margin-top:12px;}

/* Priority */
.priority{background:rgba(232,68,68,.08);border:1px solid rgba(232,68,68,.25);border-radius:14px;padding:18px 20px;margin-bottom:1.75rem;}
.priority-head{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#e84444;margin-bottom:8px;}
.priority-body{font-size:14px;color:var(--text);line-height:1.65;}

/* Notes */
.note{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;border-left:2px solid rgba(232,118,58,.4);}
.note-text{font-size:14px;color:var(--text);line-height:1.65;margin-bottom:5px;}
.note-meta{font-size:11px;color:var(--muted);letter-spacing:.04em;}

.empty{text-align:center;padding:2rem;color:var(--muted);font-size:13px;}
.loading{text-align:center;padding:1.5rem;color:var(--muted);font-size:13px;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;}
.tab{font-size:13px;padding:7px 18px;border:1px solid var(--border);border-radius:99px;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'Space Grotesk',sans-serif;transition:all .15s;font-weight:500;}
.tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface);}
.del-bar{display:none;align-items:center;gap:10px;padding:10px 14px;background:rgba(232,68,68,.08);border:1px solid rgba(232,68,68,.25);border-radius:10px;margin-bottom:12px;}
.del-bar.show{display:flex;}
input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
.row-marked td{opacity:.5;}
.legacy-badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;background:rgba(160,152,144,.15);color:var(--muted);letter-spacing:.04em;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:.65rem 1rem;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2);}
td{padding:.65rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;color:var(--text);line-height:1.45;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap;}
.c-yes{background:rgba(126,200,122,.15);color:#7ec87a;}
.c-mid{background:rgba(245,166,35,.15);color:#f5a623;}
.c-no{background:rgba(232,68,68,.15);color:#e84444;}
.c-neu{background:rgba(255,255,255,.07);color:var(--muted);}
.c-ver{background:rgba(232,118,58,.12);color:var(--accent);}
.c-sess{background:rgba(126,160,200,.12);color:#7aaac8;}

@media(max-width:560px){.signal-grid{grid-template-columns:1fr}.bar-track{width:80px}}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div>
      <div class="wordmark"><span>Sharp End</span> Exposure</div>
      <div class="title">Beta Feedback</div>
      <div class="sub" id="hdr-sub">Loading…</div>
    </div>
    <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
      <button class="btn btn-p" onclick="exportCSV()">Export CSV</button>
      <button class="btn" onclick="loadAll()">↻ Refresh</button>
    </div>
  </div>

  <div id="main-content"><div class="loading">Loading feedback…</div></div>

</div>
<script>
var SB='https://kwtbqgoqtewrlsjgepwq.supabase.co';
var SK='sb_publishable_cPznnRs3-ega2M1aYoEpDw_bJVQFS1t';
var allFeedback=[],sessionCounts={},activeTab='summary';
var selectedRows=new Set();

// ── QUESTION DEFINITIONS (index88+) ──────────────────
// Answers saved as JSON blob: {0: answer, 1: text, 2: answer, ...}
var QUESTIONS=[
  {idx:0, key:'confirm_zone_accuracy', label:'Confirm Zone accuracy',
   type:'chips',
   opts:[
     {v:'Very accurately',       color:'#7ec87a', sentiment:'pos'},
     {v:'Mostly accurately',     color:'#f5a623', sentiment:'mid'},
     {v:"Somewhat — it felt off",color:'#f5a623', sentiment:'mid'},
     {v:'Not at all accurate',   color:'#e84444', sentiment:'neg'},
     {v:"Haven't used Confirm Zone yet", color:'#a09890', sentiment:'neu'}
   ]},
  {idx:1, key:'confirm_zone_notes', label:'What felt off about Confirm Zone', type:'text'},
  {idx:2, key:'log_ease', label:'Ease of logging',
   type:'chips',
   opts:[
     {v:'Very easy — under 30 seconds', color:'#7ec87a', sentiment:'pos'},
     {v:'Easy enough',                  color:'#7ec87a', sentiment:'pos'},
     {v:'A bit slow or confusing',      color:'#f5a623', sentiment:'mid'},
     {v:'Too much friction',            color:'#e84444', sentiment:'neg'}
   ]},
  {idx:3, key:'log_improve_notes', label:'What would make logging clearer', type:'text'},
  {idx:4, key:'most_valuable', label:'Most valuable feature',
   type:'chips',
   opts:[
     {v:'Log a climb',       color:'#e8763a', sentiment:'neu'},
     {v:'Confirm Zone',      color:'#e8763a', sentiment:'neu'},
     {v:'Prepare check-in',  color:'#e8763a', sentiment:'neu'},
     {v:'Climb Log / arc',   color:'#e8763a', sentiment:'neu'},
     {v:'Projects',          color:'#e8763a', sentiment:'neu'},
     {v:'Exposure Drill',    color:'#e8763a', sentiment:'neu'}
   ]},
  {idx:5, key:'open_notes', label:'Anything else', type:'text'}
];

// ── PARSE answers JSON blob ───────────────────────────
function parseAnswers(row){
  var out = Object.assign({}, row);
  if(!row.answers) return out;
  try{
    var a = typeof row.answers === 'string' ? JSON.parse(row.answers) : row.answers;
    QUESTIONS.forEach(function(q){
      var val = a[q.idx] !== undefined ? a[q.idx] : a[String(q.idx)];
      if(val !== undefined && val !== null) out[q.key] = val;
    });
    // Legacy field passthrough
    out._raw = a;
  }catch(e){}
  return out;
}

function loadAll(){
  document.getElementById('main-content').innerHTML='<div class="loading">Loading…</div>';
  Promise.all([
    fetch(SB+'/rest/v1/feedback?order=created_at.desc&limit=1000',{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/sessions?select=device_id&limit=5000',{headers:{'apikey':SK,'Authorization':'Bearer '+SK}}).then(function(r){return r.json();})
  ]).then(function(res){
    if(!Array.isArray(res[0])){
      document.getElementById('main-content').innerHTML='<div class="empty">Could not load feedback. Check Supabase connection.</div>';
      return;
    }
    allFeedback = res[0].map(parseAnswers);
    sessionCounts = {};
    (Array.isArray(res[1])?res[1]:[]).forEach(function(s){
      sessionCounts[s.device_id] = (sessionCounts[s.device_id]||0) + 1;
    });
    render();
  }).catch(function(e){
    document.getElementById('main-content').innerHTML='<div class="empty" style="color:#e84444;">Error: '+e.message+'<br><br><small style="color:var(--muted)">Check browser console for details (F12 → Console)</small></div>';
    console.error('Feedback load error:', e);
  });
}

function render(){
  var n = allFeedback.length;
  var latest = allFeedback[0] ?
    new Date(allFeedback[0].submitted_at||allFeedback[0].created_at).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}) : '—';
  document.getElementById('hdr-sub').textContent = n+' response'+(n!==1?'s':'')+' · last received '+latest;

  var html = '';

  // Metrics
  var totalSess = allFeedback.reduce(function(a,r){return a+(sessionCounts[r.device_id]||0);},0);
  var avgSess = n ? Math.round(totalSess/n) : 0;
  var withNotes = allFeedback.filter(function(r){
    return (r.open_notes&&r.open_notes.trim()) || (r.confirm_zone_notes&&r.confirm_zone_notes.trim()) || (r.log_improve_notes&&r.log_improve_notes.trim());
  }).length;
  var vers = new Set(allFeedback.map(function(r){return r.app_version||'unknown';})).size;

  html += '<div class="metric-grid">';
  html += metricCard(n, 'Responses', 'var(--accent)');
  html += metricCard(avgSess, 'Avg sessions / tester', 'var(--text)');
  html += metricCard(withNotes, 'Responses with notes', '#f5a623');
  html += metricCard(vers, 'App versions', 'var(--text)');
  html += '</div>';

  // Tabs
  html += '<div class="tabs">';
  html += tab('summary','Summary');
  html += tab('responses','All responses');
  html += tab('notes','Open notes');
  html += tab('historical','Historical');
  html += '</div>';

  if(!n && activeTab !== 'historical'){
    html += '<div class="empty" style="padding:3rem 0;">';
    html += '<div style="font-size:32px;margin-bottom:12px;">📭</div>';
    html += '<div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">No feedback yet</div>';
    html += '<div style="font-size:13px;color:var(--muted);line-height:1.6;">Feedback submissions will appear here once testers complete the in-app feedback flow.<br>The pipeline is working — index92 is the first version where feedback saves correctly end to end.</div>';
    html += '</div>';
    document.getElementById('main-content').innerHTML = html;
    return;
  }

  if(activeTab==='summary') html += renderSummary();
  if(activeTab==='responses') html += renderTable();
  if(activeTab==='notes') html += renderNotes();
  if(activeTab==='historical') html += renderHistorical();

  document.getElementById('main-content').innerHTML = html;
}

function tab(id, label){
  return '<button class="tab'+(activeTab===id?' active':'')+'" onclick="switchTab(\''+id+'\')">'+label+'</button>';
}
function switchTab(t){activeTab=t;render();}
function metricCard(val,lbl,color){
  return '<div class="metric"><div class="metric-num" style="color:'+color+'">'+val+'</div><div class="metric-lbl">'+lbl+'</div></div>';
}

// ── SUMMARY ──────────────────────────────────────────
var SIG_DEFS=[
  {key:'confirm_zone_accuracy', title:'Confirm Zone accuracy',
   insight:function(counts,total){
     var pos=(counts['Very accurately']||0)+(counts['Mostly accurately']||0);
     var neg=counts['Not at all accurate']||0;
     if(neg>pos) return 'Confirm Zone accuracy is a problem — more testers found it inaccurate than accurate. Review the somatic question scoring.';
     if(pos===total) return 'Every tester found Confirm Zone accurate. Strong signal.';
     return Math.round((pos/total)*100)+'% found it accurate or mostly accurate.';
   }},
  {key:'log_ease', title:'Ease of logging',
   insight:function(counts,total){
     var fast=(counts['Very easy — under 30 seconds']||0)+(counts['Easy enough']||0);
     var friction=(counts['A bit slow or confusing']||0)+(counts['Too much friction']||0);
     if(friction>fast) return 'Logging friction is real — more testers found it slow than easy. Investigate the grade/terrain flow.';
     if(fast===total) return 'Logging is landing as fast. No friction issues.';
     return Math.round((fast/total)*100)+'% found logging easy. '+friction+' reported friction.';
   }},
  {key:'most_valuable', title:'Most valuable feature',
   insight:function(counts,total){
     var top=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];})[0];
     if(!top) return 'No pattern yet.';
     return '"'+top+'" is the most cited valuable feature ('+counts[top]+' of '+total+' responses).';
   }}
];

function renderSummary(){
  var rows = allFeedback.filter(function(r){
    return r.confirm_zone_accuracy||r.log_ease||r.most_valuable;
  });
  if(!rows.length) return '<div class="empty">No responses with current question format yet.</div>';

  var html = '';

  // Signal cards
  html += '<div class="section-head">At a glance</div>';
  html += '<div class="signal-grid">';
  SIG_DEFS.forEach(function(def){
    var valid = rows.filter(function(r){return r[def.key];});
    if(!valid.length) return;
    var q = QUESTIONS.find(function(q){return q.key===def.key;});
    var opts = q ? q.opts : [];
    var counts = {};
    valid.forEach(function(r){counts[r[def.key]]=(counts[r[def.key]]||0)+1;});
    var topV = Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];})[0];
    var topOpt = opts.find(function(o){return o.v===topV;})||{color:'var(--muted)',sentiment:'neu'};
    var topPct = Math.round(((counts[topV]||0)/valid.length)*100);
    var vcls = topOpt.sentiment==='pos'?'v-green':topOpt.sentiment==='neg'?'v-red':topOpt.sentiment==='mid'?'v-amber':'v-gray';
    var verdict = topOpt.sentiment==='pos'?'Positive signal':topOpt.sentiment==='neg'?'Needs attention':topOpt.sentiment==='mid'?'Mixed signal':'Varied';

    html += '<div class="sig-card">';
    html += '<div class="sig-title">'+def.title+'</div>';
    html += '<div class="sig-num" style="color:'+topOpt.color+'">'+topPct+'%</div>';
    html += '<div class="sig-desc">'+topV+'</div>';
    html += '<div class="verdict '+vcls+'">'+verdict+'</div>';
    html += '<div class="dot-row">';
    valid.forEach(function(r){
      var opt = opts.find(function(o){return o.v===r[def.key];})||{color:'var(--muted)'};
      html += '<div class="dot" style="background:'+opt.color+';opacity:.8" title="'+r[def.key]+'"></div>';
    });
    html += '</div><div class="dot-lbl">Each dot = 1 response</div></div>';
  });
  html += '</div>';

  // Full breakdown
  html += '<div class="section-head">Full breakdown</div>';
  SIG_DEFS.forEach(function(def){
    var q = QUESTIONS.find(function(q){return q.key===def.key;});
    if(!q||q.type==='text') return;
    var valid = rows.filter(function(r){return r[def.key];});
    if(!valid.length) return;
    var counts = {};
    valid.forEach(function(r){counts[r[def.key]]=(counts[r[def.key]]||0)+1;});
    var maxC = Math.max.apply(null, Object.values(counts).concat([1]));

    html += '<div class="detail-card">';
    html += '<div class="q-label">'+def.title+'</div>';
    html += '<div class="q-sub">'+q.label+' · '+valid.length+' responses</div>';
    q.opts.forEach(function(opt){
      var c = counts[opt.v]||0;
      var pct = valid.length ? Math.round((c/valid.length)*100) : 0;
      var w = maxC ? Math.round((c/maxC)*100) : 0;
      html += '<div class="bar-row">';
      html += '<div class="bar-lbl">'+opt.v+'</div>';
      html += '<div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+opt.color+'"></div></div>';
      html += '<div class="bar-n">'+c+'</div>';
      html += '<div class="bar-pct">'+pct+'%</div>';
      html += '</div>';
    });
    html += '<div class="insight">'+def.insight(counts,valid.length)+'</div>';
    html += '</div>';
  });

  // Legacy data section
  var legacyRows = allFeedback.filter(isLegacy);
  var blankRows = allFeedback.filter(isBlank);
  var jtestRows = allFeedback.filter(isJtest);

  if(jtestRows.length||blankRows.length){
    html += '<div class="section-head">Cleanup needed</div>';
    html += '<div class="detail-card">';
    if(jtestRows.length) html += '<div style="margin-bottom:8px;font-size:13px;color:#e84444;">'+jtestRows.length+' JTEST row'+(jtestRows.length!==1?'s':'')+' — will be deleted by nightly cleanup, or delete manually in All Responses tab.</div>';
    if(blankRows.length) html += '<div style="font-size:13px;color:#f5a623;">'+blankRows.length+' blank submission'+(blankRows.length!==1?'s':'')+' — mark as JTEST or delete in All Responses tab.</div>';
    html += '</div>';
  }

  if(legacyRows.length){
    html += '<div class="section-head">Legacy responses</div>';
    html += '<div class="detail-card">';
    html += '<div style="font-size:13px;color:var(--muted);">'+legacyRows.length+' response'+(legacyRows.length!==1?'s':'')+' from earlier question formats (pre-index88). Shown in All Responses tab with a Legacy badge.</div>';
    html += '</div>';
  }

  return html;
}

// ── ALL RESPONSES TABLE ───────────────────────────────
function chip(val, sentiment){
  if(!val) return '<span class="chip c-neu">—</span>';
  var cls = sentiment==='pos'?'c-yes':sentiment==='neg'?'c-no':sentiment==='mid'?'c-mid':'c-neu';
  var short = val.length>22 ? val.substring(0,20)+'…' : val;
  return '<span class="chip '+cls+'" title="'+val+'">'+short+'</span>';
}

function chipForKey(row, key){
  var val = row[key];
  if(!val) return '<span class="chip c-neu">—</span>';
  var q = QUESTIONS.find(function(q){return q.key===key;});
  if(!q||!q.opts) return '<span class="chip c-neu">'+val.substring(0,20)+'</span>';
  var opt = q.opts.find(function(o){return o.v===val;});
  var sentiment = opt ? opt.sentiment : 'neu';
  return chip(val, sentiment);
}

function isLegacy(r){
  // Legacy = saved with flat fields (pre-index88) rather than answers blob
  return !r.answers && (r.would_use_again||r.pre_climb_accurate||r.influenced_decision||r.simplicity);
}

function isBlank(r){
  if(!r.answers) return true;
  try{
    var a = typeof r.answers==='string'?JSON.parse(r.answers):r.answers;
    var vals = Object.values(a).filter(function(v){return v&&String(v).trim();});
    return vals.length===0;
  }catch(e){return true;}
}

function isJtest(r){
  var txt = JSON.stringify(r.answers||'').toLowerCase();
  return txt.includes('jtest')||txt.includes('j test');
}

function renderTable(){
  selectedRows = new Set();
  var html = '';

  // Delete action bar
  html += '<div class="del-bar" id="del-bar">';
  html += '<span style="font-size:13px;color:#e84444;" id="del-count">0 selected</span>';
  html += '<button class="btn" style="border-color:rgba(232,68,68,.4);color:#e84444;" onclick="markJtest()">Mark as JTEST</button>';
  html += '<button class="btn" style="border-color:rgba(232,68,68,.4);color:#e84444;" onclick="deleteSelected()">Delete selected</button>';
  html += '<button class="btn" onclick="clearSelection()">Clear</button>';
  html += '</div>';

  html += '<div class="tbl-wrap"><table><thead><tr>';
  html += '<th><input type="checkbox" onclick="toggleAll(this)" title="Select all"></th>';
  html += '<th>Date</th><th>Version</th><th>Sessions</th><th>Type</th><th>Confirm Zone</th><th>Log ease</th><th>Most valuable</th><th>Notes</th>';
  html += '</tr></thead><tbody>';

  if(!allFeedback.length){
    html += '<tr><td colspan="9" class="empty">No responses yet.</td></tr>';
  }

  allFeedback.forEach(function(r){
    var date = new Date(r.submitted_at||r.created_at).toLocaleDateString([],{month:'short',day:'numeric',year:'2-digit'});
    var sess = sessionCounts[r.device_id]||0;
    var notes = [r.open_notes, r.confirm_zone_notes, r.log_improve_notes].filter(Boolean).join(' / ');
    var noteHtml = notes ? ('<span title="'+notes.replace(/"/g,'&quot;')+'">'+notes.substring(0,40)+(notes.length>40?'…':'')+'</span>') : '—';
    var legacy = isLegacy(r);
    var blank = isBlank(r);
    var jtest = isJtest(r);
    var typeBadge = jtest ? '<span class="chip c-no">JTEST</span>' :
                   blank  ? '<span class="chip c-no">Blank</span>' :
                   legacy ? '<span class="legacy-badge">Legacy</span>' :
                            '<span class="chip c-yes">Live</span>';
    var trClass = (jtest||blank) ? ' class="row-marked"' : '';

    html += '<tr'+trClass+'>';
    html += '<td><input type="checkbox" data-id="'+r.id+'" onchange="toggleRow(this,this.dataset.id)"></td>';
    html += '<td style="white-space:nowrap;color:var(--muted);font-size:11px">'+date+'</td>';
    html += '<td><span class="chip c-ver">'+(r.app_version||'—')+'</span></td>';
    html += '<td><span class="chip c-sess">'+sess+'</span></td>';
    html += '<td>'+typeBadge+'</td>';
    html += '<td>'+chipForKey(r,'confirm_zone_accuracy')+'</td>';
    html += '<td>'+chipForKey(r,'log_ease')+'</td>';
    html += '<td>'+chipForKey(r,'most_valuable')+'</td>';
    html += '<td style="font-size:12px;color:var(--muted);max-width:180px">'+noteHtml+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function toggleRow(cb, id){
  if(cb.checked) selectedRows.add(id);
  else selectedRows.delete(id);
  updateDelBar();
}

function toggleAll(cb){
  document.querySelectorAll('input[data-id]').forEach(function(c){
    c.checked = cb.checked;
    if(cb.checked) selectedRows.add(c.dataset.id);
    else selectedRows.delete(c.dataset.id);
  });
  updateDelBar();
}

function clearSelection(){
  selectedRows = new Set();
  document.querySelectorAll('input[data-id]').forEach(function(c){c.checked=false;});
  updateDelBar();
}

function updateDelBar(){
  var bar = document.getElementById('del-bar');
  var cnt = document.getElementById('del-count');
  if(!bar||!cnt) return;
  bar.classList.toggle('show', selectedRows.size>0);
  cnt.textContent = selectedRows.size+' selected';
}

async function deleteSelected(){
  if(!selectedRows.size) return;
  if(!confirm('Delete '+selectedRows.size+' row(s)? This cannot be undone.')) return;
  var ids = Array.from(selectedRows);
  // Delete in batches
  var filter = ids.map(function(id){return 'id=eq.'+id;}).join(',');
  // Supabase doesn't support OR in delete easily — loop
  var ok = true;
  for(var i=0;i<ids.length;i++){
    var r = await fetch(SB+'/rest/v1/feedback?id=eq.'+ids[i],{method:'DELETE',headers:{'apikey':SK,'Authorization':'Bearer '+SK}});
    if(!r.ok) ok = false;
  }
  if(ok) { alert('Deleted '+ids.length+' row(s).'); loadAll(); }
  else alert('Some deletes failed. Refresh and try again.');
}

async function markJtest(){
  if(!selectedRows.size) return;
  var ids = Array.from(selectedRows);
  var ok = true;
  for(var i=0;i<ids.length;i++){
    var row = allFeedback.find(function(r){return r.id===ids[i];});
    if(!row) continue;
    var answers = row.answers || {};
    if(typeof answers === 'string') try{answers=JSON.parse(answers);}catch(e){answers={};}
    answers['_note'] = 'JTEST';
    var r = await fetch(SB+'/rest/v1/feedback?id=eq.'+ids[i],{
      method:'PATCH',
      headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({answers:JSON.stringify(answers)})
    });
    if(!r.ok) ok = false;
  }
  if(ok){ alert('Marked '+ids.length+' row(s) as JTEST. Nightly cleanup will delete them.'); loadAll(); }
  else alert('Some updates failed.');
}

// ── OPEN NOTES ────────────────────────────────────────
function renderNotes(){
  var withNotes = allFeedback.filter(function(r){
    return (r.open_notes&&r.open_notes.trim()) ||
           (r.confirm_zone_notes&&r.confirm_zone_notes.trim()) ||
           (r.log_improve_notes&&r.log_improve_notes.trim());
  });
  if(!withNotes.length) return '<div class="empty">No open notes yet.</div>';

  var html = '<div style="font-size:12px;color:var(--muted);margin-bottom:1rem">'+withNotes.length+' note'+(withNotes.length!==1?'s':'')+' from testers</div>';
  withNotes.forEach(function(r){
    var date = new Date(r.submitted_at||r.created_at).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
    var sess = sessionCounts[r.device_id]||0;
    var notes = [];
    if(r.open_notes&&r.open_notes.trim()) notes.push(r.open_notes.trim());
    if(r.confirm_zone_notes&&r.confirm_zone_notes.trim()) notes.push('[Confirm Zone]: '+r.confirm_zone_notes.trim());
    if(r.log_improve_notes&&r.log_improve_notes.trim()) notes.push('[Log ease]: '+r.log_improve_notes.trim());

    html += '<div class="note">';
    notes.forEach(function(n){html += '<div class="note-text">'+n+'</div>';});
    html += '<div class="note-meta">'+date+' · '+(r.app_version||'early beta')+' · '+sess+' session'+(sess!==1?'s':'')+'</div>';
    html += '</div>';
  });
  return html;
}

// ── HISTORICAL ────────────────────────────────────────
function renderHistorical(){
  var html = '<div class="section-head">Historical responses</div>';
  html += '<div class="detail-card" style="margin-bottom:16px;">';
  html += '<div style="font-size:13px;color:var(--muted);line-height:1.7;">These are responses from earlier versions of the feedback flow. They used different question formats and are shown here as raw data. The feedback pipeline was broken until index91 — most early submissions did not save successfully.</div>';
  html += '</div>';

  // Fetch all feedback including any with old flat-field format
  // For now show all current rows in raw format
  if(!allFeedback.length){
    html += '<div class="empty">No historical responses found. Earlier submissions may not have saved due to the fb-content bug fixed in index91.</div>';
    return html;
  }

  allFeedback.forEach(function(r){
    var date = new Date(r.submitted_at||r.created_at).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var sess = sessionCounts[r.device_id]||0;
    var raw = r.answers ? (typeof r.answers === 'string' ? r.answers : JSON.stringify(r.answers, null, 2)) : '—';

    html += '<div class="note">';
    html += '<div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;">'+(r.app_version||'unknown version')+'</div>';

    // Parse answers and show each question/answer pair
    try{
      var a = typeof r.answers === 'string' ? JSON.parse(r.answers) : (r.answers||{});
      QUESTIONS.forEach(function(q){
        var val = a[q.idx]!==undefined ? a[q.idx] : a[String(q.idx)];
        if(val && String(val).trim()){
          html += '<div style="margin-bottom:8px;">';
          html += '<div style="font-size:11px;color:var(--muted);margin-bottom:2px;">'+q.label+'</div>';
          html += '<div style="font-size:13px;color:var(--text);">'+val+'</div>';
          html += '</div>';
        }
      });
      // Show any extra keys
      Object.keys(a).forEach(function(k){
        if(!isNaN(k)||k==='_note') return;
        html += '<div style="margin-bottom:8px;">';
        html += '<div style="font-size:11px;color:var(--muted);margin-bottom:2px;">'+k+'</div>';
        html += '<div style="font-size:13px;color:var(--text);">'+a[k]+'</div>';
        html += '</div>';
      });
    }catch(e){
      html += '<div style="font-size:12px;font-family:Space Mono,monospace;color:var(--muted);word-break:break-all;">'+raw+'</div>';
    }

    html += '<div class="note-meta" style="margin-top:8px;">'+date+' · '+sess+' session'+(sess!==1?'s':'')+' · device: '+(r.device_id||'—').substring(0,16)+'…</div>';
    html += '</div>';
  });

  return html;
}

// ── CSV EXPORT ────────────────────────────────────────
function exportCSV(){
  var headers=['Date','Version','Sessions','Confirm Zone','Confirm Zone notes','Log ease','Log ease notes','Most valuable','Open notes'];
  var data = allFeedback.map(function(r){
    return [
      new Date(r.submitted_at||r.created_at).toLocaleDateString(),
      r.app_version||'',
      sessionCounts[r.device_id]||0,
      r.confirm_zone_accuracy||'',
      r.confirm_zone_notes||'',
      r.log_ease||'',
      r.log_improve_notes||'',
      r.most_valuable||'',
      r.open_notes||''
    ].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  });
  var csv = [headers.join(',')].concat(data).join('\n');
  var a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'sharp-end-feedback-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

loadAll();
</script>
