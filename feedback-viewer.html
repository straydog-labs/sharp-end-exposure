<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — Sharp End Exposure</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f2ed;color:#1a1a18;min-height:100vh}
.wrap{max-width:1040px;margin:0 auto;padding:2rem 1.25rem 4rem}
.hdr{padding-bottom:1.25rem;border-bottom:0.5px solid rgba(0,0,0,.12);margin-bottom:1.75rem;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.hdr-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#888780;margin-bottom:4px}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.04em;line-height:1}
.hdr-title span{color:#c8622a}
.hdr-sub{font-size:12px;color:#5f5e5a;margin-top:4px;font-weight:300}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;border:0.5px solid rgba(0,0,0,.2);background:transparent;color:#1a1a18;font-family:'DM Sans',sans-serif}
.btn:hover{background:rgba(0,0,0,.05)}
.btn-p{background:#c8622a;border-color:#c8622a;color:#fff}
.btn-p:hover{background:#e8843a}

/* Stats */
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem;margin-bottom:1.5rem}
.stat-card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem 1.25rem}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.04em;line-height:1;color:#1a1a18;margin-bottom:4px}
.stat-lbl{font-size:11px;color:#888780;letter-spacing:.04em}

/* Filters */
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.filter-lbl{font-size:12px;color:#888780;flex-shrink:0}
.fpill{font-size:12px;padding:4px 13px;border-radius:99px;border:0.5px solid rgba(0,0,0,.14);background:#fff;color:#5f5e5a;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.fpill.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.fpill.ver{border-color:rgba(200,98,42,.35);color:#c8622a}
.fpill.ver.active{background:#c8622a;border-color:#c8622a;color:#fff}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;border-bottom:0.5px solid rgba(0,0,0,.1);padding-bottom:.875rem}
.tab{font-size:13px;padding:6px 16px;border:0.5px solid rgba(0,0,0,.14);border-radius:8px;cursor:pointer;background:#fff;color:#5f5e5a;font-family:'DM Sans',sans-serif;transition:all .15s}
.tab.active{background:#1a1a18;color:#fff;border-color:#1a1a18}

/* Summary charts */
.chart-section{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.chart-title{font-size:14px;font-weight:500;margin-bottom:3px}
.chart-sub{font-size:12px;color:#888780;font-weight:300;margin-bottom:1rem}
.chart-n{font-size:11px;color:#888780;float:right;margin-top:-18px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-label{font-size:12px;color:#1a1a18;min-width:210px;flex-shrink:0;line-height:1.4}
.bar-track{flex:1;height:8px;background:rgba(0,0,0,.07);border-radius:99px;overflow:hidden;min-width:60px}
.bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
.bar-count{font-size:12px;color:#5f5e5a;min-width:22px;text-align:right;font-weight:500}
.bar-pct{font-size:11px;color:#888780;min-width:34px;text-align:right}

/* Table */
.tbl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem}
.record-count{font-size:12px;color:#888780}
.tbl-wrap{overflow-x:auto;border:0.5px solid rgba(0,0,0,.12);border-radius:12px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:.75rem 1rem;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#888780;font-weight:500;border-bottom:0.5px solid rgba(0,0,0,.1);white-space:nowrap;background:#faf8f5}
td{padding:.75rem 1rem;border-bottom:0.5px solid rgba(0,0,0,.06);vertical-align:top;color:#1a1a18;line-height:1.45}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf8f5}

/* Chips */
.chip{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.c-yes{background:rgba(74,122,90,.13);color:#2a5a3a}
.c-mid{background:rgba(200,133,42,.13);color:#7a4a10}
.c-no{background:rgba(168,56,40,.12);color:#782818}
.c-neu{background:rgba(136,135,128,.1);color:#5f5e5a}
.c-ver{background:rgba(74,100,160,.1);color:#2a3a7a}
.c-sess{background:rgba(200,98,42,.1);color:#7a3a10}

/* Open notes */
.open-entry{padding:.75rem .875rem;background:#f5f2ed;border-radius:8px;margin-bottom:8px;border-left:2px solid rgba(200,98,42,.35)}
.open-text{font-size:13px;color:#1a1a18;line-height:1.65;font-weight:300}
.open-meta{font-size:10px;color:#888780;margin-top:5px;letter-spacing:.04em}

.empty{text-align:center;padding:2.5rem;color:#888780;font-size:13px;font-weight:300}
.schema-badge{font-size:9px;padding:1px 6px;border-radius:99px;background:rgba(0,0,0,.06);color:#888780;margin-left:4px;vertical-align:middle}

@media(max-width:640px){
  .bar-label{min-width:130px;font-size:11px}
  .stat-strip{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div>
      <div class="hdr-eyebrow">Straydog Labs — Sharp End Exposure</div>
      <div class="hdr-title">Beta <span>Feedback</span></div>
      <div class="hdr-sub">All beta feedback · session count per respondent · both question schemas</div>
    </div>
    <div style="display:flex;gap:.5rem;align-items:flex-start;flex-wrap:wrap">
      <button class="btn btn-p" onclick="exportCSV()">Export CSV</button>
      <button class="btn" onclick="loadAll()">&#8635; Refresh</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-strip" id="stat-strip">
    <div class="stat-card"><div class="stat-val" id="s-total" style="color:#c8622a">—</div><div class="stat-lbl">Total responses</div></div>
    <div class="stat-card"><div class="stat-val" id="s-positive" style="color:#4a7a5a">—</div><div class="stat-lbl">Positive overall</div></div>
    <div class="stat-card"><div class="stat-val" id="s-sessions">—</div><div class="stat-lbl">Avg sessions / tester</div></div>
    <div class="stat-card"><div class="stat-val" id="s-open" style="color:#c8852a">—</div><div class="stat-lbl">With open notes</div></div>
    <div class="stat-card"><div class="stat-val" id="s-vers">—</div><div class="stat-lbl">App versions</div></div>
  </div>

  <!-- Version filter -->
  <div class="filter-row">
    <span class="filter-lbl">Version:</span>
    <button class="fpill ver active" id="vf-all" onclick="setVersionFilter('all',this)">All</button>
    <span id="ver-btns"></span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('summary',this)">Summary</button>
    <button class="tab" onclick="switchTab('table',this)">All responses</button>
    <button class="tab" onclick="switchTab('open',this)">Open notes</button>
  </div>

  <!-- SUMMARY TAB -->
  <div id="pane-summary">
    <div id="charts-new"></div>
    <div id="charts-old"></div>
  </div>

  <!-- TABLE TAB -->
  <div id="pane-table" style="display:none">
    <div class="filter-row" style="margin-bottom:.75rem">
      <span class="filter-lbl">Filter:</span>
      <button class="fpill active" onclick="setRowFilter('all',this)">All</button>
      <button class="fpill" onclick="setRowFilter('positive',this)">Positive responses</button>
      <button class="fpill" onclick="setRowFilter('notes',this)">Has open notes</button>
      <button class="fpill" onclick="setRowFilter('negative',this)">Negative responses</button>
    </div>
    <div class="tbl-header">
      <span class="record-count" id="rec-count"></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead id="tbl-head"></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>

  <!-- OPEN NOTES TAB -->
  <div id="pane-open" style="display:none">
    <div style="font-size:12px;color:#888780;margin-bottom:.875rem" id="open-count"></div>
    <div id="open-list"></div>
  </div>

</div>

<script>
var SB='https://kwtbqgoqtewrlsjgepwq.supabase.co';
var SK='sb_publishable_cPznnRs3-ega2M1aYoEpDw_bJVQFS1t';

var allFeedback=[];
var sessionCounts={};
var versionFilter='all';
var rowFilter='all';
var activeTab='summary';

// ── Load ─────────────────────────────────────────────────────────────────────
function loadAll(){
  document.getElementById('pane-summary').innerHTML='<div class="empty">Loading...</div>';
  Promise.all([
    fetch(SB+'/rest/v1/feedback?order=created_at.desc&limit=1000',{
      headers:{'apikey':SK,'Authorization':'Bearer '+SK}
    }).then(function(r){return r.json();}),
    fetch(SB+'/rest/v1/sessions?select=device_id&limit=5000',{
      headers:{'apikey':SK,'Authorization':'Bearer '+SK}
    }).then(function(r){return r.json();})
  ]).then(function(results){
    var fbResult=results[0];
    // Supabase returns an error object (not array) when query fails
    if(!Array.isArray(fbResult)){
      var msg=fbResult&&fbResult.message?fbResult.message:'Unknown error from Supabase';
      var hint=fbResult&&fbResult.hint?'<br><span style="opacity:.7">Hint: '+fbResult.hint+'</span>':'';
      document.getElementById('pane-summary').innerHTML=
        '<div class="empty" style="color:#a83828">Supabase error: '+msg+hint+
        '<br><br><span style="font-size:11px;color:#888780">Check that all feedback columns exist. Run the SQL migration if needed.</span></div>';
      console.error('Supabase feedback error:', fbResult);
      return;
    }
    allFeedback=fbResult;
    var sess=Array.isArray(results[1])?results[1]:[];
    sessionCounts={};
    sess.forEach(function(s){sessionCounts[s.device_id]=(sessionCounts[s.device_id]||0)+1;});
    buildVersionBtns();
    render();
    document.getElementById('ver-badge').textContent=
      [...new Set(allFeedback.map(function(r){return r.app_version||'unknown';}))].length+' version(s) \u00b7 '+allFeedback.length+' total';
  }).catch(function(e){
    console.error(e);
    document.getElementById('pane-summary').innerHTML='<div class="empty">Could not load. Check Supabase connection.<br><span style="font-size:11px;opacity:.7">'+e.message+'</span></div>';
  });
}

function buildVersionBtns(){
  var vs=[...new Set(allFeedback.map(function(r){return r.app_version||'unknown';}))].sort();
  document.getElementById('ver-btns').innerHTML=vs.map(function(v){
    return '<button class="fpill ver" onclick="setVersionFilter(\''+v+'\',this)">'+v+'</button>';
  }).join(' ');
}

// ── Filter helpers ────────────────────────────────────────────────────────────
function getRows(){
  return versionFilter==='all'?allFeedback:allFeedback.filter(function(r){return(r.app_version||'unknown')===versionFilter;});
}

function setVersionFilter(v,btn){
  versionFilter=v;
  document.querySelectorAll('.fpill.ver').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}
function setRowFilter(v,btn){
  rowFilter=v;
  document.querySelectorAll('#pane-table .fpill').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderTable(getRows());
}
function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  ['summary','table','open'].forEach(function(t){
    document.getElementById('pane-'+t).style.display=t===tab?'block':'none';
  });
  activeTab=tab;
  render();
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  var rows=getRows();
  renderStats(rows);
  if(activeTab==='summary')renderSummary(rows);
  if(activeTab==='table')renderTable(rows);
  if(activeTab==='open')renderOpen(rows);
}

// ── Stats strip ───────────────────────────────────────────────────────────────
function renderStats(rows){
  var n=rows.length;
  document.getElementById('s-total').textContent=n||'0';

  // Positive: new schema = yes_would/yes_long for simplicity; old = yes_regularly/yes_occasionally
  var pos=rows.filter(function(r){
    return r.simplicity==='yes_would'||r.simplicity==='yes_long'||
           r.would_use_again==='yes_regularly'||r.would_use_again==='yes_occasionally';
  }).length;
  document.getElementById('s-positive').textContent=n?Math.round((pos/n)*100)+'%':'—';

  var totalSess=rows.reduce(function(a,r){return a+(sessionCounts[r.device_id]||0);},0);
  document.getElementById('s-sessions').textContent=n?Math.round(totalSess/n)||'—':'—';

  var withNotes=rows.filter(function(r){return r.open_notes&&r.open_notes.trim();}).length;
  document.getElementById('s-open').textContent=withNotes;

  var vers=new Set(rows.map(function(r){return r.app_version||'unknown';})).size;
  document.getElementById('s-vers').textContent=vers;
}

// ── Summary charts ────────────────────────────────────────────────────────────
// New schema questions (index29+)
var NEW_Qs=[
  {key:'simplicity',title:'Flow simplicity',sub:'Was the flow simple enough you\'d actually use this at the base of a route?',
   opts:[
    {v:'yes_would',l:'Yes — would open before climbing',cls:'c-yes'},
    {v:'yes_long',l:'Yes, but slightly long',cls:'c-mid'},
    {v:'maybe',l:'Maybe — depends on route',cls:'c-mid'},
    {v:'no',l:'No — too many steps',cls:'c-no'},
   ]},
  {key:'somatic_real',title:'Somatic check-in felt real',sub:'Did the somatic check-in feel real — did you actually notice something in your body?',
   opts:[
    {v:'yes_noticed',l:'Yes — noticed something new',cls:'c-yes'},
    {v:'more_aware',l:'Made me more aware than expected',cls:'c-yes'},
    {v:'somewhat',l:'Somewhat — noticed but not surprising',cls:'c-mid'},
    {v:'not_really',l:'Not really — didn\'t physically feel it',cls:'c-no'},
   ]},
  {key:'body_scan_real',title:'Body scan — surfaced anything?',sub:'Did the body scan surface anything you weren\'t aware of before the check-in?',
   opts:[
    {v:'yes_noticed',l:'Yes — noticed something I hadn\'t registered',cls:'c-yes'},
    {v:'somewhat',l:'Somewhat — prompted awareness but not new',cls:'c-mid'},
    {v:'tapped_through',l:'Not really — tapped through it',cls:'c-no'},
    {v:'nothing',l:'Nothing was present to notice',cls:'c-neu'},
   ]},
  {key:'delta_accurate',title:'Delta card accuracy',sub:'Did the result — seeing the shift described in words — feel accurate?',
   opts:[
    {v:'yes_accurate',l:'Yes — described what I experienced',cls:'c-yes'},
    {v:'mostly',l:'Mostly — close but not quite',cls:'c-mid'},
    {v:'not_accurate',l:'Not really — language didn\'t match',cls:'c-no'},
    {v:'unsure',l:'Unsure — need more sessions',cls:'c-neu'},
   ]},
];

// Old schema questions (pre-index29)
var OLD_Qs=[
  {key:'would_use_again',title:'Would use again',sub:'Would you use this again before climbing? (earlier question format)',
   opts:[
    {v:'yes_regularly',l:'Yes — regularly',cls:'c-yes'},
    {v:'yes_occasionally',l:'Yes — occasionally',cls:'c-mid'},
    {v:'probably_not',l:'Probably not',cls:'c-no'},
    {v:'no',l:'No',cls:'c-no'},
   ]},
  {key:'what_felt_accurate',title:'What felt accurate',sub:'What felt most accurate about the result?',
   opts:[
    {v:'somatic_checkin',l:'Somatic check-in',cls:'c-yes'},
    {v:'zone_placement',l:'Zone placement',cls:'c-yes'},
    {v:'route_analysis',l:'Route analysis',cls:'c-mid'},
    {v:'post_climb',l:'Post-climb reflection',cls:'c-mid'},
   ]},
  {key:'what_felt_missing',title:'What felt missing',sub:'Anything that felt unclear or missing?',
   opts:[
    {v:'nothing_missing',l:'Nothing missing',cls:'c-yes'},
    {v:'somatic_unclear',l:'Somatic check-in was unclear',cls:'c-no'},
    {v:'guidance_text',l:'Guidance text unclear',cls:'c-no'},
    {v:'exposure_map',l:'Exposure map unclear',cls:'c-no'},
    {v:'post_climb_unclear',l:'Post-climb unclear',cls:'c-no'},
   ]},
  {key:'behavior_change',title:'Behavior change',sub:'Did the result change how you thought about the climb?',
   opts:[
    {v:'changed_assessment',l:'Changed my assessment',cls:'c-yes'},
    {v:'more_aware',l:'Made me more body aware',cls:'c-yes'},
    {v:'thinking_not_changed',l:'Changed thinking, not behavior',cls:'c-mid'},
    {v:'no_change',l:'No change',cls:'c-no'},
   ]},
];

var BAR_COLORS={'c-yes':'#4a7a5a','c-mid':'#c8852a','c-no':'#a83828','c-neu':'#888780'};

function makeChartSection(q,rows){
  var valid=rows.filter(function(r){return r[q.key];});
  if(!valid.length)return'';
  var counts={};
  valid.forEach(function(r){counts[r[q.key]]=(counts[r[q.key]]||0)+1;});
  var maxC=Math.max.apply(null,Object.values(counts).concat([1]));
  var bars=q.opts.map(function(opt){
    var c=counts[opt.v]||0;
    var pct=valid.length?Math.round((c/valid.length)*100):0;
    var w=Math.round((c/maxC)*100);
    var col=BAR_COLORS[opt.cls]||'#888';
    return '<div class="bar-row">'+
      '<div class="bar-label">'+opt.l+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+w+'%;background:'+col+'"></div></div>'+
      '<div class="bar-count">'+c+'</div>'+
      '<div class="bar-pct">'+pct+'%</div>'+
    '</div>';
  }).join('');
  return '<div class="chart-section">'+
    '<div class="chart-title">'+q.title+'<span class="chart-n">'+valid.length+' response'+(valid.length!==1?'s':'')+'</span></div>'+
    '<div class="chart-sub">'+q.sub+'</div>'+
    bars+
  '</div>';
}

function renderSummary(rows){
  // New schema — show for rows that have new fields
  var newRows=rows.filter(function(r){return r.simplicity||r.somatic_real||r.body_scan_real||r.delta_accurate;});
  var oldRows=rows.filter(function(r){return r.would_use_again||r.what_felt_accurate||r.what_felt_missing||r.behavior_change;});

  var newHtml=newRows.length?
    '<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#888780;margin-bottom:.75rem">Current format (index29+)</div>'+
    NEW_Qs.map(function(q){return makeChartSection(q,newRows);}).join(''):
    '';

  var oldHtml=oldRows.length?
    '<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#888780;margin:1.5rem 0 .75rem">Earlier format (pre-index29)</div>'+
    OLD_Qs.map(function(q){return makeChartSection(q,oldRows);}).join(''):
    '';

  var empty=(!newRows.length&&!oldRows.length)?'<div class="empty">No feedback yet for this version</div>':'';

  document.getElementById('pane-summary').innerHTML=(newHtml||'')+(oldHtml||'')+empty;
}

// ── Table ─────────────────────────────────────────────────────────────────────
var NEW_SHORT={
  yes_would:'Yes ✓',yes_long:'Yes (long)',maybe:'Maybe',no:'No ✗',
  yes_noticed:'Yes ✓',more_aware:'More aware',somewhat:'Somewhat',not_really:'Not really ✗',
  tapped_through:'Tapped thru',nothing:'Nothing',
  yes_accurate:'Yes ✓',mostly:'Mostly',not_accurate:'Not accurate ✗',unsure:'Unsure'
};
var OLD_SHORT={
  yes_regularly:'Yes — regularly',yes_occasionally:'Yes — occasionally',probably_not:'Probably not',no:'No',
  somatic_checkin:'Somatic ✓',zone_placement:'Zone ✓',route_analysis:'Route analysis',post_climb:'Post-climb',
  nothing_missing:'Nothing missing ✓',somatic_unclear:'Somatic unclear',guidance_text:'Guidance unclear',exposure_map:'Map unclear',post_climb_unclear:'Post-climb unclear',
  changed_assessment:'Changed assessment',more_aware:'More aware',thinking_not_changed:'Thinking changed',no_change:'No change'
};

function chipFor(val,key){
  var pos={
    simplicity:['yes_would','yes_long'],somatic_real:['yes_noticed','more_aware'],
    body_scan_real:['yes_noticed'],delta_accurate:['yes_accurate'],
    would_use_again:['yes_regularly','yes_occasionally'],
    what_felt_accurate:['somatic_checkin','zone_placement'],
    what_felt_missing:['nothing_missing'],
    behavior_change:['changed_assessment','more_aware']
  };
  var neg={
    simplicity:['no'],somatic_real:['not_really'],body_scan_real:['tapped_through'],delta_accurate:['not_accurate'],
    would_use_again:['no','probably_not'],what_felt_missing:['somatic_unclear','guidance_text','exposure_map'],
    behavior_change:['no_change']
  };
  if(!val)return'<span class="chip c-neu">—</span>';
  var label=NEW_SHORT[val]||OLD_SHORT[val]||val;
  var cls=(pos[key]||[]).includes(val)?'c-yes':(neg[key]||[]).includes(val)?'c-no':'c-mid';
  return'<span class="chip '+cls+'">'+label+'</span>';
}

function isPositive(r){
  return r.simplicity==='yes_would'||r.simplicity==='yes_long'||
         r.would_use_again==='yes_regularly'||r.would_use_again==='yes_occasionally'||
         r.delta_accurate==='yes_accurate';
}
function isNegative(r){
  return r.simplicity==='no'||r.would_use_again==='no'||r.would_use_again==='probably_not'||r.delta_accurate==='not_accurate';
}

function renderTable(rows){
  // Apply row filter
  var filtered=rows;
  if(rowFilter==='positive')filtered=rows.filter(isPositive);
  else if(rowFilter==='negative')filtered=rows.filter(isNegative);
  else if(rowFilter==='notes')filtered=rows.filter(function(r){return r.open_notes&&r.open_notes.trim();});

  document.getElementById('rec-count').textContent=filtered.length+' response'+(filtered.length!==1?'s':'');

  // Detect schemas
  var hasNew=filtered.some(function(r){return r.simplicity||r.somatic_real||r.delta_accurate;});
  var hasOld=filtered.some(function(r){return r.would_use_again||r.what_felt_accurate;});

  var headCols=['Date','Version','Sessions'];
  if(hasNew){headCols.push('Simplicity','Somatic real','Body scan','Delta accurate');}
  if(hasOld){headCols.push('Would use','Accurate','Missing','Behavior');}
  headCols.push('Open notes');

  document.getElementById('tbl-head').innerHTML='<tr>'+headCols.map(function(c){return'<th>'+c+'</th>';}).join('')+'</tr>';

  if(!filtered.length){
    document.getElementById('tbl-body').innerHTML='<tr><td colspan="'+headCols.length+'" class="empty">No responses match this filter</td></tr>';
    return;
  }

  document.getElementById('tbl-body').innerHTML=filtered.map(function(r){
    var date=new Date(r.created_at).toLocaleDateString([],{month:'short',day:'numeric',year:'2-digit'});
    var sess=sessionCounts[r.device_id]||0;
    var isNew=r.simplicity||r.somatic_real||r.delta_accurate;
    var ver=r.app_version||'—';
    var note=r.open_notes?
      '<span title="'+r.open_notes.replace(/"/g,'&quot;')+'">'+r.open_notes.substring(0,55)+(r.open_notes.length>55?'...':'')+'</span>':
      '<span style="color:#888780">—</span>';

    var cells='<td style="white-space:nowrap;color:#888780;font-size:11px">'+date+'</td>'+
      '<td><span class="chip c-ver">'+ver+'</span></td>'+
      '<td><span class="chip c-sess">'+sess+' session'+(sess!==1?'s':'')+'</span></td>';

    if(hasNew){
      cells+=isNew?
        '<td>'+chipFor(r.simplicity,'simplicity')+'</td>'+
        '<td>'+chipFor(r.somatic_real,'somatic_real')+'</td>'+
        '<td>'+chipFor(r.body_scan_real,'body_scan_real')+'</td>'+
        '<td>'+chipFor(r.delta_accurate,'delta_accurate')+'</td>':
        '<td colspan="4" style="color:#888780;font-size:11px">earlier format</td>';
    }
    if(hasOld){
      cells+=!isNew?
        '<td>'+chipFor(r.would_use_again,'would_use_again')+'</td>'+
        '<td>'+chipFor(r.what_felt_accurate,'what_felt_accurate')+'</td>'+
        '<td>'+chipFor(r.what_felt_missing,'what_felt_missing')+'</td>'+
        '<td>'+chipFor(r.behavior_change,'behavior_change')+'</td>':
        '<td colspan="4" style="color:#888780;font-size:11px">current format</td>';
    }
    cells+='<td style="font-size:11px;color:#5f5e5a;max-width:200px;line-height:1.5">'+note+'</td>';

    return'<tr>'+cells+'</tr>';
  }).join('');
}

// ── Open notes ────────────────────────────────────────────────────────────────
function renderOpen(rows){
  var withNotes=[...rows].filter(function(r){return r.open_notes&&r.open_notes.trim();});
  document.getElementById('open-count').textContent=withNotes.length+' entr'+(withNotes.length!==1?'ies':'y');
  if(!withNotes.length){document.getElementById('open-list').innerHTML='<div class="empty">No open notes yet</div>';return;}
  document.getElementById('open-list').innerHTML=withNotes.map(function(r){
    var date=new Date(r.created_at).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
    var sess=sessionCounts[r.device_id]||0;
    return'<div class="open-entry">'+
      '<div class="open-text">'+r.open_notes+'</div>'+
      '<div class="open-meta">'+date+' &middot; '+(r.app_version||'—')+' &middot; '+sess+' session'+(sess!==1?'s':'')+'</div>'+
    '</div>';
  }).join('');
}

// ── CSV export ────────────────────────────────────────────────────────────────
function exportCSV(){
  var rows=getRows();
  var headers=['Date','Version','Sessions','Simplicity','Somatic real','Body scan','Delta accurate','Would use again','What felt accurate','What felt missing','Behavior change','Open notes'];
  var data=rows.map(function(r){
    return[
      new Date(r.created_at).toLocaleDateString(),
      r.app_version||'',
      sessionCounts[r.device_id]||0,
      NEW_SHORT[r.simplicity]||r.simplicity||'',
      NEW_SHORT[r.somatic_real]||r.somatic_real||'',
      NEW_SHORT[r.body_scan_real]||r.body_scan_real||'',
      NEW_SHORT[r.delta_accurate]||r.delta_accurate||'',
      OLD_SHORT[r.would_use_again]||r.would_use_again||'',
      OLD_SHORT[r.what_felt_accurate]||r.what_felt_accurate||'',
      OLD_SHORT[r.what_felt_missing]||r.what_felt_missing||'',
      OLD_SHORT[r.behavior_change]||r.behavior_change||'',
      r.open_notes||''
    ].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');
  });
  var csv=[headers.join(',')].concat(data).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='sharp-end-feedback-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

loadAll();
</script>
